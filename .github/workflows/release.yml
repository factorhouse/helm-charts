name: Release Charts

on:
  push:
    branches:
      - main
      - feature/FAC-158_gain-more-artifacthub-recognition

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Setup GPG
        run: |
          # Import the private key
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          
          # Get key ID and fingerprint
          KEY_ID=$(gpg --list-secret-keys --with-colons | grep '^sec' | head -n1 | cut -d':' -f5)
          KEY_FINGERPRINT=$(gpg --list-secret-keys --with-colons | grep '^fpr' | head -n1 | cut -d':' -f10)
          echo "KEY_ID=$KEY_ID" >> $GITHUB_ENV
          echo "KEY_FINGERPRINT=$KEY_FINGERPRINT" >> $GITHUB_ENV
          
          # Trust the key ultimately using fingerprint
          echo "${KEY_FINGERPRINT}:6:" | gpg --import-ownertrust
          
          # Test signing to ensure key works
          echo "test" | gpg --batch --yes --pinentry-mode loopback \
              --passphrase "$GPG_PASSPHRASE" \
              --armor --detach-sign --local-user "$KEY_ID"
              
          echo "GPG setup complete. Key ID: $KEY_ID"
          echo "GPG setup complete. Fingerprint: $KEY_FINGERPRINT"
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          
      - name: Create Chart Releaser config
        run: |
          echo "$GPG_PASSPHRASE" > passphrase.txt
          chmod 600 passphrase.txt
          
          cat <<EOF > .cr.yaml
          sign: true
          key: "$KEY_ID"
          passphrase-file: "passphrase.txt"
          EOF
          
          echo "=== Chart Releaser Config ==="
          cat .cr.yaml
          echo "=== Available Keys ==="
          gpg --list-secret-keys --keyid-format LONG
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          
      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        with:
          config: .cr.yaml
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"